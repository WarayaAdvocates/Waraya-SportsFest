<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://wxyzofficial.sirv.com/WARAYA/logo.png">
  <title>WARAYA Sportsfest 2026 | Live Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      background: linear-gradient(135deg, #eef2ff 0%, #d9e4ff 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 1100px; margin: 0 auto; }

    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 2rem;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .header img { height: 70px; margin-bottom: 0.5rem; }
    .header h1 { font-size: 2.2rem; font-weight: 800; background: linear-gradient(120deg, #0b3b6b, #1e6fdf); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .header .theme { color: #1e6fdf; font-weight: 600; font-size: 1.1rem; }
    .header .tagline { color: #4a627a; font-style: italic; }

    .back-btn {
      display: inline-block;
      background: #1e6fdf;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 1rem;
      transition: 0.2s;
    }
    .back-btn:hover { background: #0b4a9f; transform: translateY(-2px); }

    .live-badge {
      display: inline-block;
      background: #dc2626;
      color: white;
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 10px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .result-card {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      padding: 1.5rem;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.3s ease;
      animation: fadeInUp 0.4s ease;
    }
    .result-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.12); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-card .sport-name {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0a2540;
      margin-bottom: 0.5rem;
      border-bottom: 2px solid #1e6fdf;
      padding-bottom: 0.5rem;
    }

    .result-card .matchup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin: 0.8rem 0;
      flex-wrap: wrap;
    }
    .result-card .matchup .team {
      font-weight: 600;
      font-size: 1rem;
      padding: 4px 12px;
      border-radius: 20px;
      background: #f1f5f9;
    }
    .result-card .matchup .vs {
      font-weight: 700;
      color: #1e6fdf;
      font-size: 0.9rem;
    }

    .result-card .winner-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 0.5rem 0;
      background: #d1fae5;
      padding: 6px 16px;
      border-radius: 40px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }
    .result-card .winner-section .winner-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #065f46;
    }
    .result-card .winner-section .winner-name {
      font-weight: 700;
      color: #065f46;
      font-size: 0.95rem;
    }

    .result-card .score {
      display: inline-block;
      background: #eef3ff;
      padding: 4px 16px;
      border-radius: 20px;
      font-weight: 600;
      color: #1e6fdf;
      font-size: 0.9rem;
      margin: 0.3rem 0;
      text-align: center;
      display: block;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }

    .result-card .players-section {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: #f8fafc;
      border-radius: 16px;
      font-size: 0.8rem;
      color: #4a627a;
    }
    .result-card .players-section .team-players {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .result-card .players-section .team-players span {
      background: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      border: 1px solid #e2e8f0;
    }
    .result-card .timestamp {
      font-size: 0.65rem;
      color: #6c8db0;
      margin-top: 0.8rem;
      border-top: 1px solid #e2e8f0;
      padding-top: 0.8rem;
      text-align: center;
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      background: rgba(255,255,255,0.9);
      border-radius: 32px;
      color: #6c8db0;
    }
    .empty-state h3 { font-size: 1.5rem; color: #0a2540; margin-bottom: 0.5rem; }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }

    .filter-section {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      padding: 1rem 1.5rem;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.5);
    }
    .filter-section label { font-weight: 600; color: #4a627a; font-size: 0.85rem; }
    .filter-section select {
      padding: 8px 16px;
      border-radius: 40px;
      border: 1px solid #cbd5e1;
      background: white;
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }
    .filter-section .count { margin-left: auto; font-size: 0.8rem; color: #6c8db0; }

    .toast-notification {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #1f2937;
      color: white;
      padding: 12px 24px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.85rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: slideIn 0.3s ease;
      z-index: 999;
    }
    .toast-notification .highlight { color: #86efac; font-weight: 700; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(100px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.6rem; }
      .results-grid { grid-template-columns: 1fr; }
      .filter-section { flex-direction: column; align-items: stretch; }
      .filter-section .count { margin-left: 0; text-align: center; }
      .result-card .players-section .team-players { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <img src="https://wxyzofficial.sirv.com/WARAYA/logo.png" alt="WARAYA Logo">
    <h1>🏆 22nd Anniversary Sportsfest</h1>
    <div class="theme">WARAYA: Champions Beyond Service</div>
    <div class="tagline">“Together We Play, Together We Lead.”</div>
    <div style="margin-top: 0.8rem;">
      <span class="live-badge">🔴 LIVE</span>
    </div>
    <div style="margin-top: 1rem;">
      <a href="login.html" class="back-btn">Staff Login</a>
      <a href="guidelines.html" class="back-btn">Guidelines</a>
    </div>
  </div>

  <div class="filter-section">
    <label>🏅 Filter by Sport:</label>
    <select id="sportFilter">
      <option value="all">All Sports</option>
      <option value="Pickleball">🏓 Pickleball</option>
      <option value="Volleyball">🏐 Volleyball</option>
      <option value="Mobile Legends">📱 Mobile Legends</option>
      <option value="Chess">♟️ Chess</option>
      <option value="Scrabble">🔤 Scrabble</option>
    </select>
    <span class="count" id="resultCount">Loading results...</span>
  </div>

  <div id="resultsContainer" class="results-grid">
    <div class="empty-state">
      <div class="emoji">⏳</div>
      <h3>Loading Results...</h3>
      <p>Please wait while we fetch the latest results.</p>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC2jwodhMqk3_fHYZiM8oPeRBb4MtXcMzQ",
    authDomain: "waraya-e1de8.firebaseapp.com",
    projectId: "waraya-e1de8",
    storageBucket: "waraya-e1de8.firebasestorage.app",
    messagingSenderId: "140173641530",
    appId: "1:140173641530:web:7bdacc1c6c55bdf332f203",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const resultsContainer = document.getElementById('resultsContainer');
  const sportFilter = document.getElementById('sportFilter');
  const resultCount = document.getElementById('resultCount');
  let allResults = [];
  let isFirstLoad = true;

  const teamColors = {
    'Water Tribe': '#2563eb',
    'Earth Kingdom': '#16a34a',
    'Fire Nation': '#dc2626',
    'Air Nomads': '#eab308'
  };

  const teamIcons = {
    'Water Tribe': '💧',
    'Earth Kingdom': '🌍',
    'Fire Nation': '🔥',
    'Air Nomads': '🍃'
  };

  function getTeamColor(team) {
    return teamColors[team] || '#6c8db0';
  }

  function getTeamTextColor(team) {
    return team === 'Air Nomads' ? '#422006' : 'white';
  }

  function showToast(message, isNew = true) {
    // Remove existing toast
    const existing = document.querySelector('.toast-notification');
    if (existing) existing.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    if (isNew) {
      toast.innerHTML = `🔄 <span class="highlight">New Result!</span> ${message}`;
    } else {
      toast.textContent = message;
    }
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  }

  function renderResults(filter = 'all') {
    let filtered = allResults;
    if (filter !== 'all') {
      filtered = allResults.filter(r => r.sport === filter);
    }
    resultCount.textContent = `${filtered.length} result(s)`;

    if (filtered.length === 0) {
      resultsContainer.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="emoji">📭</div>
          <h3>No Results Yet</h3>
          <p>Check back later for the latest sportsfest results!</p>
        </div>
      `;
      return;
    }

    resultsContainer.innerHTML = filtered.map((r, index) => {
      const team1Color = getTeamColor(r.team1);
      const team2Color = getTeamColor(r.team2);
      const winnerColor = getTeamColor(r.winner);
      const winnerTextColor = getTeamTextColor(r.winner);
      
      return `
      <div class="result-card" style="animation-delay: ${index * 0.05}s">
        <div class="sport-name">${r.sport}</div>
        
        <div class="matchup">
          <span class="team" style="background: ${team1Color}; color: ${getTeamTextColor(r.team1)};">${teamIcons[r.team1] || '🏅'} ${r.team1}</span>
          <span class="vs">⚔️ VS ⚔️</span>
          <span class="team" style="background: ${team2Color}; color: ${getTeamTextColor(r.team2)};">${teamIcons[r.team2] || '🏅'} ${r.team2}</span>
        </div>
        
        <div class="winner-section">
          <span class="winner-label">🏆 WINNER</span>
          <span class="winner-name" style="color: ${winnerColor};">${teamIcons[r.winner] || '🏅'} ${r.winner}</span>
        </div>
        
        <div class="score">${r.score}</div>
        
        ${(r.team1Players || r.team2Players) ? `
          <div class="players-section">
            <div class="team-players">
              ${r.team1Players ? `<span style="border-color: ${team1Color};"><strong>${r.team1}:</strong> ${r.team1Players}</span>` : ''}
              ${r.team2Players ? `<span style="border-color: ${team2Color};"><strong>${r.team2}:</strong> ${r.team2Players}</span>` : ''}
            </div>
          </div>
        ` : ''}
        
        <div class="timestamp">${r.createdAt?.toDate ? r.createdAt.toDate().toLocaleString('en-PH', { dateStyle: 'medium', timeStyle: 'short' }) : 'Just posted'}</div>
      </div>
    `}).join('');
  }

  // Set up real-time listener with onSnapshot
  function setupRealtimeListener() {
    const q = query(collection(db, "sportsfest_results"), orderBy("createdAt", "desc"));
    
    onSnapshot(q, (snapshot) => {
      const newResults = [];
      snapshot.docChanges().forEach((change) => {
        const data = change.doc.data();
        const result = { id: change.doc.id, ...data };
        newResults.push(result);
      });
      
      // Update allResults
      allResults = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      
      // Render
      renderResults(sportFilter.value);
      
      // Show toast notification for new results (except on first load)
      if (!isFirstLoad && snapshot.docChanges().length > 0) {
        const added = snapshot.docChanges().filter(c => c.type === 'added');
        if (added.length > 0) {
          const latest = added[0].doc.data();
          showToast(`${latest.sport} - ${latest.winner} wins! (${latest.score})`, true);
        }
      }
      isFirstLoad = false;
      
    }, (error) => {
      console.error("Error listening to results:", error);
      resultsContainer.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="emoji">⚠️</div>
          <h3>Connection Error</h3>
          <p>Unable to connect to the server. Please refresh the page.</p>
        </div>
      `;
    });
  }

  sportFilter.addEventListener('change', () => renderResults(sportFilter.value));

  // Start the real-time listener
  setupRealtimeListener();

  // Show a connection status indicator
  console.log('🔴 WARAYA Results - Live updates enabled');
</script>
</body>
</html>
