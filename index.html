<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://wxyzofficial.sirv.com/WARAYA/logo.png">
  <title>WARAYA Sportsfest 2026 | Thank You</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      background: linear-gradient(135deg, #eef2ff 0%, #d4e0ff 50%, #b8ccf0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Animated background elements */
    body::before {
      content: "🏆";
      font-size: 400px;
      position: fixed;
      bottom: -120px;
      left: -100px;
      opacity: 0.04;
      pointer-events: none;
      transform: rotate(-15deg);
      animation: float 20s ease-in-out infinite;
    }
    body::after {
      content: "⚡";
      font-size: 300px;
      position: fixed;
      top: -80px;
      right: -80px;
      opacity: 0.04;
      pointer-events: none;
      transform: rotate(15deg);
      animation: float 25s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: rotate(-15deg) translateY(0px); }
      50% { transform: rotate(-10deg) translateY(-30px); }
    }

    /* Floating decoration icons */
    .floating-icons {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.06;
      font-size: 80px;
      animation: floatIcon 15s ease-in-out infinite;
    }
    .floating-icons:nth-child(1) { top: 8%; left: 5%; animation-delay: 0s; }
    .floating-icons:nth-child(2) { top: 20%; right: 3%; font-size: 70px; animation-delay: 3s; }
    .floating-icons:nth-child(3) { bottom: 15%; left: 3%; font-size: 90px; animation-delay: 6s; }
    .floating-icons:nth-child(4) { bottom: 30%; right: 4%; font-size: 60px; animation-delay: 2s; }
    .floating-icons:nth-child(5) { top: 50%; left: 2%; font-size: 50px; animation-delay: 8s; }
    .floating-icons:nth-child(6) { top: 60%; right: 2%; font-size: 55px; animation-delay: 5s; }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-40px) rotate(10deg); }
    }

    .container {
      max-width: 900px;
      width: 100%;
      position: relative;
      z-index: 1;
      animation: fadeInUp 0.8s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .celebration-card {
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(20px);
      border-radius: 80px;
      padding: 4rem 3rem;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.08), 0 0 0 1px rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.3);
      position: relative;
      overflow: hidden;
    }

    /* Decorative corner elements */
    .celebration-card::before {
      content: '✨';
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      opacity: 0.15;
      animation: sparkle 3s ease-in-out infinite;
    }
    .celebration-card::after {
      content: '✨';
      position: absolute;
      bottom: 20px;
      left: 30px;
      font-size: 40px;
      opacity: 0.15;
      animation: sparkle 3s ease-in-out infinite 1.5s;
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0.1; transform: scale(1) rotate(0deg); }
      50% { opacity: 0.3; transform: scale(1.2) rotate(20deg); }
    }

    /* Top accent bar */
    .accent-bar {
      width: 120px;
      height: 5px;
      background: linear-gradient(90deg, #1e6fdf, #3b8bff, #1e6fdf);
      background-size: 200% 100%;
      margin: 0 auto 2rem;
      border-radius: 10px;
      animation: shimmerBar 3s ease-in-out infinite;
    }
    @keyframes shimmerBar {
      0%, 100% { background-position: -200% 0; }
      50% { background-position: 200% 0; }
    }

    .logo {
      height: 90px;
      width: auto;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.06));
      animation: logoPulse 4s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .main-title {
      font-size: 3.5rem;
      font-weight: 900;
      line-height: 1.2;
      background: linear-gradient(135deg, #0b3b6b 0%, #1e6fdf 40%, #3b8bff 70%, #1e6fdf 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
      animation: gradientShift 6s ease-in-out infinite;
    }
    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .sub-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0a2540;
      margin-top: 0.5rem;
      letter-spacing: 1px;
      opacity: 0.9;
    }

    .divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #1e6fdf, transparent);
      margin: 1.5rem auto;
      border-radius: 10px;
    }

    .message {
      font-size: 1.1rem;
      color: #4a627a;
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.8;
      font-weight: 400;
    }

    .message .highlight {
      color: #1e6fdf;
      font-weight: 600;
    }

    .year-badge {
      display: inline-block;
      background: linear-gradient(135deg, #1e6fdf, #0b4a9f);
      color: white;
      padding: 0.3rem 2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 700;
      margin-top: 1.5rem;
      letter-spacing: 3px;
      box-shadow: 0 4px 20px rgba(30,111,223,0.2);
    }

    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear infinite;
      opacity: 0.5;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10vh) rotate(0deg) scale(1);
        opacity: 0.5;
      }
      100% {
        transform: translateY(110vh) rotate(720deg) scale(0.5);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      .celebration-card { padding: 2.5rem 1.5rem; border-radius: 48px; }
      .main-title { font-size: 2.2rem; }
      .sub-title { font-size: 1.2rem; }
      .message { font-size: 0.95rem; }
      .logo { height: 65px; }
    }
    @media (max-width: 480px) {
      .celebration-card { padding: 2rem 1.2rem; border-radius: 32px; }
      .main-title { font-size: 1.6rem; }
      .sub-title { font-size: 1rem; }
      .message { font-size: 0.85rem; }
      .logo { height: 55px; }
    }
  </style>
</head>
<body>

<!-- Floating decoration icons -->
<div class="floating-icons" style="top:8%;left:5%;">🏅</div>
<div class="floating-icons" style="top:20%;right:3%;">⚽</div>
<div class="floating-icons" style="bottom:15%;left:3%;">🏀</div>
<div class="floating-icons" style="bottom:30%;right:4%;">🎯</div>
<div class="floating-icons" style="top:50%;left:2%;">🎾</div>
<div class="floating-icons" style="top:60%;right:2%;">🏐</div>

<!-- Confetti Container -->
<div class="confetti-container" id="confettiContainer"></div>

<div class="container">
  <div class="celebration-card">
    <div class="accent-bar"></div>
    
    <img src="https://wxyzofficial.sirv.com/WARAYA/logo.png" alt="WARAYA Logo" class="logo">
    
    <div class="main-title">
      Happy 22nd Anniversary,<br>
      Waray-waray Youth Advocates!
    </div>
    
    <div class="divider"></div>
    
    <div class="sub-title">
      See You at WARAYA SportsFest Season II!
    </div>
    
    <div class="year-badge">✦ 2004 - 2026 ✦</div>
    
    <div class="message">
      <span class="highlight">Once a WARAYA, Always a WARAYA.</span>
    </div>
  </div>
</div>

<script>
  // Generate confetti particles
  const confettiContainer = document.getElementById('confettiContainer');
  const colors = ['#1e6fdf', '#3b8bff', '#2563eb', '#0b3b6b', '#86efac', '#fbbf24', '#dc2626', '#16a34a', '#eab308'];
  
  function createConfetti() {
    for (let i = 0; i < 80; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.width = (Math.random() * 8 + 4) + 'px';
      confetti.style.height = (Math.random() * 8 + 4) + 'px';
      confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      confetti.style.animationDuration = (Math.random() * 8 + 6) + 's';
      confetti.style.animationDelay = (Math.random() * 10) + 's';
      confetti.style.opacity = Math.random() * 0.4 + 0.2;
      confettiContainer.appendChild(confetti);
    }
  }
  
  createConfetti();
</script>
</body>
</html>
